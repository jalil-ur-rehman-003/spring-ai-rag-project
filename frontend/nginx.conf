server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxies to the backend container (see infra/docker-compose.yml, service
    # name "backend"). Kept as a relative apiBaseUrl on the frontend
    # (environment.prod.ts) so no rebuild is needed to point at a different
    # host/IP - only this proxy target changes per environment.
    location /api/v1/ {
        proxy_pass http://backend:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The chat streaming endpoint responds with text/event-stream
        # (SseEmitter) - buffering here would hold the whole response until
        # it completes instead of forwarding chunks as they arrive, which
        # defeats streaming entirely.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Angular's client-side router needs every unmatched path to fall back to
    # index.html rather than a raw nginx 404, or a hard refresh on any deep
    # link (e.g. /documents) breaks.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
