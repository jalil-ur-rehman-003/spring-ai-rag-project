server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular's client-side router needs every unmatched path to fall back to
    # index.html rather than a raw nginx 404, or a hard refresh on any deep
    # link (e.g. /documents) breaks.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
