spring:
  application:
    name: documind-backend

  autoconfigure:
    # Excluded permanently, not just until an EmbeddingModel bean exists: the plan calls for
    # DocumentChunkJdbcRepository (direct JDBC batch insert into document_chunk) rather than
    # Spring AI's generic VectorStore API, since document_chunk needs first-class
    # organization_id/document_id/page_number columns alongside the vector that the VectorStore's
    # generic metadata map doesn't give us cleanly. The auto-configured PgVectorStore bean would
    # otherwise be built (now that a real EmbeddingModel bean exists) but is simply unused.
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:documind}
    username: ${DB_USERNAME:documind}
    password: ${DB_PASSWORD}

  jpa:
    # Flyway owns the schema; Hibernate must never auto-generate or alter DDL.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
    # Voyage is not a Spring AI-supported provider out of the box; documind.ai.voyage.*
    # (below, under the documind namespace) configures our own adapter, EmbeddingModelConfig.

  servlet:
    multipart:
      # Matches documind.documents.max-upload-size-bytes (50 MiB) with headroom for multipart overhead;
      # keeps Spring's own request-size rejection from firing before our own, more specific, validation does.
      max-file-size: 55MB
      max-request-size: 55MB

documind:
  ai:
    voyage:
      api-key: ${VOYAGE_API_KEY}
      model: voyage-4
  security:
    jwt:
      signing-key: ${JWT_SIGNING_KEY}
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 30
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
  documents:
    max-upload-size-bytes: 52428800 # 50 MiB
  ingestion:
    chunking:
      # ~500-800 tokens with 15-20% overlap is the plan's target range for retrieval quality;
      # 650/100 sits in the middle of both.
      max-tokens-per-chunk: 650
      overlap-tokens: 100
    scheduler:
      enabled: true # set to false in test contexts (@DynamicPropertySource) to avoid polling a torn-down test database
      poll-interval-ms: 5000
  object-storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:documind-minio}
    secret-key: ${S3_SECRET_KEY:}
    bucket: ${S3_BUCKET:documind}
    region: ${S3_REGION:us-east-1}
  chat:
    retrieval:
      top-k: 6 # plan's target range is 4-8 retrieved chunks per query
  guardrail:
    rate-limit:
      requests-per-minute: 20
    scope-refusal:
      minimum-similarity: 0.5
    toxicity:
      # Empty by default -- a real deployment would populate this with an actual policy/brand-safety
      # blocklist; Claude's own safety training is the primary defense, this is just a backstop.
      blocked-terms: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
