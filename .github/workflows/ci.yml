name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      # Testcontainers-backed integration tests (AuthControllerIntegrationTest,
      # DocumentControllerIntegrationTest, etc.) need a real Docker daemon --
      # ubuntu-latest runners ship with one pre-installed, no extra setup needed.
      - name: Run backend test suite (mvn verify)
        working-directory: backend
        run: mvn -B verify

      - name: Upload backend surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend test suite
        working-directory: frontend
        run: npm test -- --watch=false

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build
