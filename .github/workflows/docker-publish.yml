name: Build and Publish Images

# Triggered by any one of the gating workflows finishing on main; the check-gates job then
# queries the Actions API for the *latest run of every* gating workflow against this same commit
# SHA and only proceeds once all of them show a successful conclusion. A simple `needs:` across
# workflow files isn't possible (that only works within one workflow), and reacting to just the
# single triggering workflow's own conclusion would let this publish before the others finish.
on:
  workflow_run:
    workflows: [CI, CodeQL SAST, Dependency Vulnerability Scan, Container Image Vulnerability Scan]
    branches: [main, master]
    types: [completed]

jobs:
  check-gates:
    name: Verify all required workflows succeeded for this commit
    runs-on: ubuntu-latest
    outputs:
      all-passed: ${{ steps.gate.outputs.all-passed }}
    steps:
      - name: Check latest run of every gating workflow for this SHA
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          required_workflows=("CI" "CodeQL SAST" "Dependency Vulnerability Scan" "Container Image Vulnerability Scan")
          all_passed=true

          for workflow_name in "${required_workflows[@]}"; do
            conclusion=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${COMMIT_SHA}&per_page=100" \
              --jq ".workflow_runs[] | select(.name == \"${workflow_name}\") | .conclusion" | head -n1)

            echo "Workflow '${workflow_name}' conclusion for ${COMMIT_SHA}: ${conclusion:-<no run found>}"
            if [ "$conclusion" != "success" ]; then
              all_passed=false
            fi
          done

          echo "all-passed=${all_passed}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build and push ${{ matrix.component }} image
    needs: check-gates
    if: needs.check-gates.outputs.all-passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/documind-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/documind-${{ matrix.component }}:${{ github.event.workflow_run.head_sha }}
